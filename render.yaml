# Render Blueprint — deploy backend + managed PostgreSQL
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: inventory-db
    databaseName: inventory_db
    user: inventory
    plan: free

services:
  - type: web
    name: inventory-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
