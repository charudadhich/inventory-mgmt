# Render Blueprint — deploy backend + managed PostgreSQL

databases:
  - name: inventory-db
    databaseName: inventory_db
    user: inventory
    plan: free

services:
  - type: web
    name: inventory-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
